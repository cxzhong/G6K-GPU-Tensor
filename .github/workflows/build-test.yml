name: Build and Test G6K-GPU-Tensor

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-cpu:
    name: Build and test CPU version
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Prevent jobs from hanging
    # Add concurrency control to prevent cache conflicts
    concurrency:
      group: cuda-install-${{ matrix.python-version }}-${{ matrix.cuda-version }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 4  # Can increase since we're only testing one CUDA version
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        cuda-version: ["13.0.0"]  # Test only with CUDA 13.0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache CUDA Installation
      id: cache-cuda
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/cuda*
          ~/.cache/cuda
        key: cuda-${{ matrix.cuda-version }}-${{ runner.os }}-${{ runner.arch }}-v2
        restore-keys: |
          cuda-${{ matrix.cuda-version }}-${{ runner.os }}-
          cuda-12-${{ runner.os }}-

    - name: Install CUDA Toolkit ${{ matrix.cuda-version }}
      id: cuda-install
      if: steps.cache-cuda.outputs.cache-hit != 'true'
      uses: Jimver/cuda-toolkit@v0.2.27
      with:
        cuda: ${{ matrix.cuda-version }}
        method: 'network'
        use-github-cache: false  # Disable internal caching to avoid conflicts
        log-file-suffix: '-py${{ matrix.python-version }}-${{ github.run_id }}'  # Unique log files
        non-cuda-sub-packages: '[]'  # Minimal installation
        sub-packages: '["nvcc", "cuobjdump", "nvprune", "cupti", "nvdisasm"]'
      continue-on-error: true
      timeout-minutes: 20  # Prevent hanging installations
      env:
        # Add unique environment variables to avoid conflicts
        CUDA_INSTALL_ID: 'py${{ matrix.python-version }}-cuda${{ matrix.cuda-version }}-${{ github.run_id }}'

    - name: Set CUDA environment variables
      if: steps.cuda-install.outcome == 'success'
      run: |
        echo "✅ CUDA installation successful"
        echo "CUDA_HOME=${{ steps.cuda-install.outputs.CUDA_PATH }}" >> $GITHUB_ENV
        echo "${{ steps.cuda-install.outputs.CUDA_PATH }}/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=${{ steps.cuda-install.outputs.CUDA_PATH }}/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "CPATH=${{ steps.cuda-install.outputs.CUDA_PATH }}/include:$CPATH" >> $GITHUB_ENV
        
        # Check and handle CUDA installer logs
        if [ -f "/var/log/cuda-installer.log" ]; then
          echo "CUDA installer log found, checking for errors..."
          if grep -i "error\|failed\|exception" /var/log/cuda-installer.log; then
            echo "⚠️ Errors found in CUDA installer log"
          else
            echo "✅ No errors found in CUDA installer log"
          fi
          
          # Make log accessible for debugging if needed
          sudo chmod 644 /var/log/cuda-installer.log 2>/dev/null || true
          sudo chown $USER /var/log/cuda-installer.log 2>/dev/null || true
        fi

    - name: Fallback CUDA installation (if action fails or cache miss)
      if: steps.cuda-install.outcome == 'failure' || (steps.cache-cuda.outputs.cache-hit != 'true' && steps.cuda-install.outcome != 'success')
      run: |
        echo "CUDA installation needed, trying multiple methods..."
        
        # Method 1: Try direct download and install
        CUDA_VERSION="${{ matrix.cuda-version }}"
        CUDA_MAJOR=$(echo $CUDA_VERSION | cut -d. -f1)
        CUDA_MINOR=$(echo $CUDA_VERSION | cut -d. -f2)
        
        echo "Attempting direct CUDA installation for version $CUDA_VERSION"
        
        # Create temporary directory
        TEMP_DIR=$(mktemp -d)
        cd $TEMP_DIR
        
        # Method 1a: Try runfile installation
        RUNFILE_URL="https://developer.download.nvidia.com/compute/cuda/${CUDA_VERSION}/local_installers/cuda_${CUDA_VERSION}_550.54.15_linux.run"
        echo "Trying runfile installation from: $RUNFILE_URL"
        
        if wget -q --spider $RUNFILE_URL 2>/dev/null; then
          wget $RUNFILE_URL -O cuda_installer.run
          chmod +x cuda_installer.run
          
          # Install with retry mechanism
          for attempt in 1 2 3; do
            echo "Installation attempt $attempt/3..."
            if sudo ./cuda_installer.run --silent --toolkit --no-drm --no-man-page --override; then
              echo "✅ CUDA runfile installation successful"
              break
            else
              echo "⚠️ Installation attempt $attempt failed, retrying..."
              sleep 10
            fi
          done
        fi
        
        # Method 1b: Try repository installation
        if [ ! -f "/usr/local/cuda/bin/nvcc" ]; then
          echo "Trying repository installation..."
          
          # Add NVIDIA package repository with better Ubuntu 24.04 support
          OS_VERSION=$(lsb_release -rs | tr -d '.')
          ARCH=$(uname -m)
          
          # Handle Ubuntu 24.04 specifically
          if [ "$OS_VERSION" = "2404" ]; then
            REPO_VERSION="ubuntu2404"
          elif [ "$OS_VERSION" = "2204" ]; then
            REPO_VERSION="ubuntu2204"
          elif [ "$OS_VERSION" = "2004" ]; then
            REPO_VERSION="ubuntu2004"
          else
            # Fallback to 22.04 for unknown versions
            REPO_VERSION="ubuntu2204"
          fi
          
          echo "Using repository: $REPO_VERSION for OS version $OS_VERSION"
          
          # Download and install keyring
          wget -O /tmp/cuda-keyring.deb "https://developer.download.nvidia.com/compute/cuda/repos/${REPO_VERSION}/${ARCH}/cuda-keyring_1.1-1_all.deb" || {
            echo "⚠️ Failed to download keyring, trying alternative..."
            wget -O /tmp/cuda-keyring.deb "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/${ARCH}/cuda-keyring_1.1-1_all.deb"
          }
          
          sudo dpkg -i /tmp/cuda-keyring.deb 2>/dev/null || echo "Keyring install may have failed, continuing..."
          
          # Clean up potential duplicate sources
          sudo rm -f /etc/apt/sources.list.d/archive_uri-http_developer_download_nvidia_com_compute_cuda_repos_*
          
          sudo apt-get update -qq || echo "apt update failed, continuing..."
          
          # Try installing available CUDA packages for version 13.0
          echo "Attempting to install CUDA 13.0 packages..."
          sudo apt-get install -y \
            cuda-nvcc-13-0 \
            cuda-cuobjdump-13-0 \
            cuda-nvprune-13-0 \
            cuda-cupti-13-0 \
            cuda-nvdisasm-13-0 2>/dev/null || {
            
            echo "⚠️ CUDA 13.0 packages failed, trying minimal toolkit installation..."
            sudo apt-get install -y cuda-toolkit-13-0 2>/dev/null || \
            sudo apt-get install -y cuda-toolkit-12-0 2>/dev/null || \
            sudo apt-get install -y nvidia-cuda-toolkit 2>/dev/null || \
            echo "⚠️ All repository CUDA installation methods failed"
          }
        fi
        
        # Clean up
        cd /
        rm -rf $TEMP_DIR
        
        # Verify installation and set environment
        CUDA_FOUND=false
        
        # Check for nvcc in various locations
        CUDA_PATHS=(
          "/usr/local/cuda"
          "/usr/local/cuda-${CUDA_MAJOR}.${CUDA_MINOR}"
          "/usr/local/cuda-${CUDA_MAJOR}-${CUDA_MINOR}"
          "/usr/local/cuda-13.0"
          "/usr/local/cuda-12.0"
          "/usr/cuda"
          "/usr"
        )
        
        for cuda_path in "${CUDA_PATHS[@]}"; do
          if [ -f "$cuda_path/bin/nvcc" ]; then
            echo "✅ Found CUDA at: $cuda_path"
            echo "CUDA_HOME=$cuda_path" >> $GITHUB_ENV
            echo "$cuda_path/bin" >> $GITHUB_PATH
            echo "LD_LIBRARY_PATH=$cuda_path/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
            echo "CPATH=$cuda_path/include:${CPATH}" >> $GITHUB_ENV
            CUDA_FOUND=true
            break
          fi
        done
        
        # Also check if nvcc is available via system packages (Ubuntu 24.04 style)
        if [ "$CUDA_FOUND" = false ] && command -v nvcc >/dev/null 2>&1; then
          echo "✅ Found system nvcc: $(which nvcc)"
          CUDA_HOME=$(dirname $(dirname $(which nvcc)))
          echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          echo "CPATH=/usr/include/cuda:${CPATH}" >> $GITHUB_ENV
          CUDA_FOUND=true
        fi
        
        if [ "$CUDA_FOUND" = false ]; then
          echo "⚠️ CUDA installation failed - will build CPU-only version"
          echo "CUDA_AVAILABLE=false" >> $GITHUB_ENV
        else
          echo "CUDA_AVAILABLE=true" >> $GITHUB_ENV
        fi

    - name: Cleanup CUDA installation artifacts
      if: always()
      run: |
        # Clean up any temporary CUDA installation files to prevent conflicts
        sudo rm -f /tmp/cuda-*.run 2>/dev/null || true
        sudo rm -f /tmp/cuda-keyring.deb 2>/dev/null || true
        
        # Handle CUDA installer logs
        if [ -f "/var/log/cuda-installer.log" ]; then
          # Make log accessible and create a unique copy if needed
          LOG_COPY="/tmp/cuda-install-py${{ matrix.python-version }}-${{ github.run_id }}.log"
          sudo cp /var/log/cuda-installer.log "$LOG_COPY" 2>/dev/null || true
          sudo chmod 644 "$LOG_COPY" 2>/dev/null || true
          sudo chown $USER "$LOG_COPY" 2>/dev/null || true
          echo "CUDA installer log copied to: $LOG_COPY"
        fi

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libgmp-dev \
          libmpfr-dev \
          libfplll-dev \
          libfplll8 \
          git \
          pkg-config \
          python3-dev \
          cython3
          
        # Ensure fpylll system dependencies are available
        sudo apt-get install -y \
          libeigen3-dev \
          libboost-dev \
          autotools-dev \
          autoconf \
          libtool

    - name: Ensure pip and upgrade build tools
      run: |
        # Ensure pip is available
        python -m ensurepip --upgrade 2>/dev/null || echo "ensurepip already available"
        python -m pip install --upgrade pip
        python -m pip install --upgrade wheel setuptools build

    - name: Install parallel-hashmap dependency
      run: |
        sudo apt-get update
        sudo apt-get install -y libparallel-hashmap-dev || {
          echo "⚠️ Package libparallel-hashmap-dev not available, installing from source as fallback..."
          git clone https://github.com/greg7mdp/parallel-hashmap.git
          cd parallel-hashmap
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install
        }

    - name: Install fpylll dependency
      run: |
        echo "Installing fpylll..."
        python -m pip install fpylll || echo "⚠️ fpylll installation failed, will try during build"

    - name: Verify CUDA installation
      run: |
        echo "Checking CUDA installation..."
        
        if command -v nvcc >/dev/null 2>&1; then
          echo "✅ nvcc found: $(which nvcc)"
          nvcc --version
        else
          echo "⚠️ nvcc not found"
        fi
        
        echo "CUDA_HOME: ${CUDA_HOME:-Not set}"
        echo "PATH: $PATH"
        echo "LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-Not set}"
        
        # Check for CUDA in all possible locations
        CUDA_LOCATIONS=(
          "/usr/local/cuda"
          "/usr/local/cuda-13.0"
          "/usr/local/cuda-12.5"
          "/usr/local/cuda-12.0"
          "/opt/cuda"
          "/usr/cuda"
        )
        
        echo "Scanning for CUDA installations:"
        for cuda_path in "${CUDA_LOCATIONS[@]}"; do
          if [ -d "$cuda_path" ]; then
            echo "📁 Found directory: $cuda_path"
            if [ -f "$cuda_path/bin/nvcc" ]; then
              echo "  ✅ nvcc found: $cuda_path/bin/nvcc"
              ls -la "$cuda_path/bin/nvcc"
            else
              echo "  ❌ nvcc not found in $cuda_path/bin/"
            fi
          fi
        done
        
        # Check system-installed CUDA packages
        echo "Checking system CUDA packages:"
        dpkg -l | grep cuda | head -10 || echo "No CUDA packages found"
        
        # Set fallback environment if CUDA found but CUDA_HOME not set
        if [ -z "$CUDA_HOME" ] && command -v nvcc >/dev/null 2>&1; then
          NVCC_PATH=$(which nvcc)
          CUDA_HOME_FALLBACK=$(dirname $(dirname "$NVCC_PATH"))
          echo "Setting fallback CUDA_HOME to $CUDA_HOME_FALLBACK"
          echo "CUDA_HOME=$CUDA_HOME_FALLBACK" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$CUDA_HOME_FALLBACK/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        fi

    - name: Build and install G6K with GPU support
      timeout-minutes: 30
      run: |
        echo "Building G6K..."
        
        echo "Building G6K for CI environment..."
        
        # GitHub CI doesn't have GPU drivers, so build CPU-only version
        # even if CUDA toolkit is installed
        echo "🖥️ Building CPU-only version (no GPU drivers in CI environment)"
        G6K_ENABLE_CUDA=0 python -m pip install -e . -v 2>&1 | tee build.log
        
        # Verify that CPU-only build completed successfully
        if [ $? -eq 0 ]; then
          echo "✅ CPU-only build completed successfully"
        else
          echo "❌ Build failed, checking build log..."
          grep -i "error\|failed" build.log || echo "No obvious errors in build log"
          exit 1
        fi

    - name: Test G6K imports and extensions
      run: |
        python -c "
print('Testing G6K imports...')
import g6k
print('✅ g6k imported successfully')

from g6k import Siever
print('✅ Siever class imported successfully')

try:
    import fpylll
    print('✅ fpylll imported successfully')
except ImportError as e:
    print('⚠️ fpylll import failed:', e)

# Check built extensions
import os
extensions = []
for root, dirs, files in os.walk('g6k'):
    for file in files:
        if file.endswith('.so'):
            extensions.append(os.path.join(root, file))

print(f'Built extensions: {extensions}')
print('✅ G6K imports successful!')
"

    - name: Upload build artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-py${{ matrix.python-version }}-cuda${{ matrix.cuda-version }}-${{ github.run_id }}
        path: |
          build.log
          /tmp/cuda-install-*.log
          /var/log/cuda-installer*.log
        retention-days: 7
        if-no-files-found: ignore

    - name: Test G6K functionality (CPU-only for CI)
      run: |
        echo "Testing G6K functionality (CPU-only - no GPU drivers in CI)..."
        
        # Test basic G6K functionality without GPU
        python -c "
import sys
sys.path.insert(0, '.')

print('Testing basic G6K functionality...')
from g6k.utils.util import load_svp_challenge
from g6k import Siever

# Load a small challenge matrix
A = load_svp_challenge(40, seed=1337)
print(f'✅ Loaded SVP challenge matrix, shape: {A.nrows}x{A.ncols}')

# Initialize siever (will use CPU-only since no GPU drivers)
g6k = Siever(A)
print('✅ Siever initialized successfully')

# Run basic sieving test
g6k.initialize_local(0, 0, 20)  
g6k()
print(f'✅ Basic sieving completed, found {g6k.l} vectors')

print('✅ G6K CPU functionality test passed!')
"

    - name: Test rebuild script functionality
      run: |
        # Test that rebuild script works (should use pip backend)
        chmod +x ./rebuild.sh
        ./rebuild.sh --fast
        echo "✅ Rebuild script executed successfully"

  build-validation:
    name: Validate package distribution
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install CUDA Toolkit
      id: cuda-install-validation
      uses: Jimver/cuda-toolkit@v0.2.27
      with:
        cuda: '12.5.0'
        method: 'local'
      continue-on-error: true

    - name: Set CUDA environment for validation
      if: steps.cuda-install-validation.outcome == 'success'
      run: |
        echo "CUDA_HOME=${{ steps.cuda-install-validation.outputs.CUDA_PATH }}" >> $GITHUB_ENV
        echo "${{ steps.cuda-install-validation.outputs.CUDA_PATH }}/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=${{ steps.cuda-install-validation.outputs.CUDA_PATH }}/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "CPATH=${{ steps.cuda-install-validation.outputs.CUDA_PATH }}/include:$CPATH" >> $GITHUB_ENV

    - name: Fallback CUDA installation for validation
      if: steps.cuda-install-validation.outcome == 'failure'
      run: |
        echo "CUDA action failed, trying manual installation..."
        python -m ensurepip --upgrade 2>/dev/null || echo "ensurepip already available"
        python -m pip install --upgrade pip
        sudo apt-get update || true
        sudo apt-get install -y nvidia-cuda-toolkit || echo "⚠️ CUDA toolkit installation failed"
        
        # Set CUDA paths for fallback
        for cuda_path in /usr/local/cuda /usr/lib/nvidia-cuda-toolkit; do
          if [ -d "$cuda_path" ]; then
            echo "CUDA_HOME=$cuda_path" >> $GITHUB_ENV
            echo "$cuda_path/bin" >> $GITHUB_PATH || true
            echo "CPATH=$cuda_path/include:$CPATH" >> $GITHUB_ENV
            break
          fi
        done

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libgmp-dev \
          libmpfr-dev \
          libfplll-dev \
          libfplll8 \
          python3-dev \
          cython3 \
          libeigen3-dev \
          libboost-dev

    - name: Install build tools
      run: |
        python -m ensurepip --upgrade 2>/dev/null || echo "ensurepip already available"
        python -m pip install --upgrade pip
        python -m pip install build twine check-manifest fpylll

    - name: Install parallel-hashmap
      run: |
        sudo apt-get update
        sudo apt-get install -y libparallel-hashmap-dev || {
          echo "⚠️ Package libparallel-hashmap-dev not available, installing from source as fallback..."
          git clone https://github.com/greg7mdp/parallel-hashmap.git
          cd parallel-hashmap
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install
        }

    - name: Check manifest completeness
      run: |
        check-manifest --verbose

    - name: Build CPU-only source distribution
      run: |
        echo "� Building CPU-only source distribution for CI..."
        export G6K_ENABLE_CUDA=0
        python -m build --sdist

    - name: Build CPU-only wheel distribution
      run: |
        echo "� Building CPU-only wheel distribution for CI..."
        export G6K_ENABLE_CUDA=0
        python -m build --wheel

    - name: Check distribution metadata
      run: |
        python -m twine check dist/*

    - name: Test installation from CPU-only wheel
      run: |
        python -m pip install dist/*.whl
        python -c "
import g6k
print('✅ CPU-only wheel installation successful')

# Check compiled extensions
import os
extensions = []
for root, dirs, files in os.walk('g6k'):
    for file in files:
        if file.endswith('.so'):
            extensions.append(file)

print(f'Found extensions: {extensions}')
print('✅ Package installation and import test passed')
"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install quality tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 black isort

    - name: Check Python code formatting with black
      run: |
        black --check --diff *.py g6k/ || echo "⚠️ Consider running: black *.py g6k/"

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff *.py g6k/ || echo "⚠️ Consider running: isort *.py g6k/"

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 *.py g6k/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other issues as warnings
        flake8 *.py g6k/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install safety checker
      run: |
        python -m pip install --upgrade pip safety

    - name: Check for known security vulnerabilities
      run: |
        # Check dependencies for known vulnerabilities
        python -m pip install -e . --dry-run 2>/dev/null || echo "Dry run for dependency check"
        safety check --json || echo "⚠️ Security vulnerabilities found, review recommended"