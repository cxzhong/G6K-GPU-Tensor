name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for changelog

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install CUDA Toolkit
      id: cuda-install-release
      uses: Jimver/cuda-toolkit@v0.2.27
      with:
        cuda: '12.5.0'
        method: 'local'
      continue-on-error: true

    - name: Set CUDA environment for release
      if: steps.cuda-install-release.outcome == 'success'
      run: |
        echo "CUDA_HOME=${{ steps.cuda-install-release.outputs.CUDA_PATH }}" >> $GITHUB_ENV
        echo "${{ steps.cuda-install-release.outputs.CUDA_PATH }}/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=${{ steps.cuda-install-release.outputs.CUDA_PATH }}/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "CPATH=${{ steps.cuda-install-release.outputs.CUDA_PATH }}/include:$CPATH" >> $GITHUB_ENV

    - name: Fallback CUDA installation for release
      if: steps.cuda-install-release.outcome == 'failure'
      run: |
        echo "CUDA action failed, trying alternative installation..."
        python -m ensurepip --upgrade 2>/dev/null || echo "ensurepip already available"
        python -m pip install --upgrade pip
        sudo apt-get update || true
        sudo apt-get install -y nvidia-cuda-toolkit || echo "⚠️ Will build without CUDA"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libgmp-dev \
          libmpfr-dev \
          libfplll-dev \
          libfplll8 \
          python3-dev \
          cython3 \
          libeigen3-dev \
          libboost-dev

    - name: Install build tools
      run: |
        python -m ensurepip --upgrade 2>/dev/null || echo "ensurepip already available"
        python -m pip install --upgrade pip wheel setuptools build twine fpylll

    - name: Install parallel-hashmap
      run: |
        git clone https://github.com/greg7mdp/parallel-hashmap.git
        cd parallel-hashmap
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        make -j$(nproc)
        sudo make install

    - name: Build distributions
      run: |
        if command -v nvcc &> /dev/null; then
          echo "🚀 Building GPU-enabled distributions..."
          echo "CUDA version: $(nvcc --version)"
        else
          echo "⚠️ Building distributions without CUDA support..."
          export G6K_ENABLE_CUDA=0
        fi
        
        python -m build
        
        echo "Built files:"
        ls -la dist/

    - name: Check distributions
      run: |
        python -m twine check dist/*

    - name: Generate release notes
      id: release_notes
      run: |
        echo "Generating release notes..."
        
        # Get the tag name
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        else
          TAG_NAME="${GITHUB_REF#refs/tags/}"
        fi
        
        echo "Release tag: $TAG_NAME"
        
        # Generate changelog since last tag
        PREV_TAG=$(git describe --tags --abbrev=0 $TAG_NAME^ 2>/dev/null || echo "")
        
        if [ -n "$PREV_TAG" ]; then
          echo "Changes since $PREV_TAG:" > release_notes.md
          git log --oneline --pretty=format:"- %s" $PREV_TAG..$TAG_NAME >> release_notes.md
        else
          echo "# G6K-GPU-Tensor: Advanced Lattice Sieving with GPU Acceleration" > release_notes.md
          echo "" >> release_notes.md
          echo "🚀 **GPU-Accelerated Lattice Sieving Library**" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 🎯 Core Features:" >> release_notes.md
          echo "- **CUDA GPU Acceleration**: Full Tensor Core support for high-performance sieving" >> release_notes.md
          echo "- **Modern Python Packaging**: PEP 517/518 compliant with pip install -e ." >> release_notes.md
          echo "- **Advanced Algorithms**: State-of-the-art lattice sieving implementations" >> release_notes.md
          echo "- **Automatic CUDA Detection**: Seamless GPU compilation and fallback" >> release_notes.md
          echo "- **Flexible Configuration**: Custom dimension limits via rebuild.sh" >> release_notes.md
          echo "- **Dependency Management**: Automated fpylll, FPLLL, parallel-hashmap setup" >> release_notes.md
        fi
        
        echo "" >> release_notes.md
        echo "## 🛠️ Installation:" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo "# Requires NVIDIA CUDA Toolkit (12.0.0+ or 12.5.0+)" >> release_notes.md
        echo "pip install -e ." >> release_notes.md
        echo "" >> release_notes.md
        echo "# Custom maximum dimension:" >> release_notes.md
        echo "./rebuild.sh -m 160 --fast" >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "## 🚀 GPU Requirements:" >> release_notes.md
        echo "- **NVIDIA GPU**: Compute Capability 6.0+ (Pascal, Volta, Turing, Ampere, Ada Lovelace)" >> release_notes.md
        echo "- **CUDA Toolkit**: Version 12.0.0 or 12.5.0+ with nvcc compiler" >> release_notes.md
        echo "- **Tensor Cores**: Supported on Volta V100, Turing RTX 20xx, Ampere RTX 30xx/40xx" >> release_notes.md
        echo "- **Memory**: 8GB+ VRAM recommended for large dimension challenges" >> release_notes.md
        echo "" >> release_notes.md
        echo "See [INSTALL.md](INSTALL.md) for detailed installation instructions." >> release_notes.md
        
        cat release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        name: Release ${{ github.event.inputs.tag || github.ref_name }}
        body_path: release_notes.md
        files: |
          dist/*
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Test PyPI (optional)
      if: github.event_name == 'workflow_dispatch'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        echo "Uploading to Test PyPI..."
        python -m twine upload --repository testpypi dist/* || echo "⚠️ Test PyPI upload failed or not configured"

  notify:
    name: Notify Release
    needs: release
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Notify success
      run: |
        echo "✅ Release ${{ github.ref_name }} created successfully!"
        echo "📦 Distribution files uploaded to GitHub Releases"
        echo "🔗 Release URL: https://github.com/cxzhong/G6K-GPU-Tensor/releases/tag/${{ github.ref_name }}"